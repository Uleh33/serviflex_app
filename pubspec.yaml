name: todolisto
description: "TodoListo - Tu app de servicios a un click."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  google_sign_in: ^6.2.1
  google_maps_flutter: ^2.10.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "flutter_01.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - flutter_01.png
